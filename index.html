<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Teste de Login Simples</title>
    <link rel="shortcut icon" href="assets/favicon/favicon.n1.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    
</head>
<body> 
    <main>
        <div class="video-background">
        <video autoplay loop muted playsinline>
        <source src="assets/video/6158921-uhd_3840_2160_25fps FIRE.mp4" type="video/mp4">
        </video>
        </div>

        <div class="container">
            <h1>Sistema de Login</h1>
            <p>Para efetuar o login, será necessário preencher os seguintes campos:</p>

            <div class="container2">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome...">
            </div>
            
            <div class="container2">
                <label for="idade">Idade:</label>
                <input type="number" name="number" id="idade" placeholder="Digite sua idade...">
            </div>

            <div class="container2">
                <label for="senha">Senha: </label>
                <input type="password" id="senha" placeholder="Digite sua senha...">
            </div>

            <button type="button" id="btn1">Entrar</button>
            
            <div id="res"></div>

            <div class="link">
                <a href="#">🔗 Não tem Cadastro? Cadastre-se aqui!</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
